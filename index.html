<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard ตารางรายการรถเช่า</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #f5f5f0 0%, #ffffff 60%, #eef2ff 100%);
    padding: 14px 32px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    border-bottom: 3px solid #1e40af;
  }
  header .icon { font-size: 36px; }
  header h1 { font-size: 22px; font-weight: 700; color: #1e3a8a; letter-spacing: 0.5px; }
  header p { font-size: 13px; color: #3b82f6; margin-top: 2px; }

  .main { padding: 24px 28px; }

  /* KPI Cards */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 18px 20px;
    border: 1px solid #334155;
    position: relative; overflow: hidden;
    transition: transform 0.2s;
  }
  .kpi-card:hover { transform: translateY(-2px); }
  .kpi-card .accent { position: absolute; top: 0; left: 0; width: 4px; height: 100%; border-radius: 12px 0 0 12px; }
  .kpi-card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .kpi-card .value { font-size: 28px; font-weight: 800; line-height: 1; }
  .kpi-card .sub { font-size: 12px; color: #64748b; margin-top: 6px; }
  .kpi-blue .accent { background: #3b82f6; } .kpi-blue .value { color: #60a5fa; }
  .kpi-green .accent { background: #22c55e; } .kpi-green .value { color: #4ade80; }
  .kpi-yellow .accent { background: #f59e0b; } .kpi-yellow .value { color: #fbbf24; }
  .kpi-red .accent { background: #ef4444; } .kpi-red .value { color: #f87171; }
  .kpi-purple .accent { background: #a855f7; } .kpi-purple .value { color: #c084fc; }

  /* Charts */
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; margin-bottom: 24px; }
  .chart-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #334155;
  }
  .chart-card h3 { font-size: 14px; font-weight: 600; color: #cbd5e1; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .chart-card canvas { max-height: 240px; }

  /* Alert bar */
  .alert-section { margin-bottom: 24px; }
  .alert-box {
    background: #431407;
    border: 1px solid #dc2626;
    border-radius: 10px;
    padding: 14px 20px;
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 10px;
  }
  .alert-box.warn { background: #451a03; border-color: #d97706; }
  .alert-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
  .alert-title { font-size: 14px; font-weight: 700; color: #fca5a5; }
  .alert-box.warn .alert-title { color: #fcd34d; }
  .alert-list { margin-top: 6px; font-size: 12px; color: #94a3b8; line-height: 1.6; }

  /* Table */
  .table-section { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
  .table-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; flex-wrap: wrap; gap: 12px; }
  .table-header h3 { font-size: 14px; font-weight: 600; color: #cbd5e1; }
  .filters { display: flex; gap: 10px; flex-wrap: wrap; }
  .filters select, .filters input {
    background: #0f172a; color: #e2e8f0; border: 1px solid #475569;
    border-radius: 8px; padding: 7px 12px; font-size: 12px; outline: none;
    cursor: pointer;
  }
  .filters select:focus, .filters input:focus { border-color: #3b82f6; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #0f172a; color: #64748b; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 14px; text-align: left; }
  td { padding: 10px 14px; border-bottom: 1px solid #1e293b; color: #cbd5e1; vertical-align: middle; }
  tr:hover td { background: #243044; }
  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .badge-new { background: #1d4ed8; color: #bfdbfe; }
  .badge-used { background: #374151; color: #9ca3af; }
  .badge-expired { background: #450a0a; color: #fca5a5; border: 1px solid #dc2626; }
  .badge-soon3 { background: #451a03; color: #fcd34d; border: 1px solid #d97706; }
  .badge-soon6 { background: #1c1917; color: #fdba74; border: 1px solid #f97316; }
  .badge-ok { background: #052e16; color: #86efac; border: 1px solid #22c55e; }
  .price-text { color: #a78bfa; font-weight: 600; }
  .company-text { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pagination { padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #334155; font-size: 12px; color: #64748b; }
  .pag-btns { display: flex; gap: 6px; }
  .pag-btns button {
    background: #0f172a; color: #94a3b8; border: 1px solid #334155;
    border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 12px;
    transition: all 0.15s;
  }
  .pag-btns button:hover, .pag-btns button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .pag-btns button:disabled { opacity: 0.3; cursor: not-allowed; }

  .days-pill { font-size: 11px; font-weight: 500; }
  .days-negative { color: #f87171; }
  .days-warn { color: #fbbf24; }
  .days-ok { color: #4ade80; }

  /* Clickable row */
  tr.clickable { cursor: pointer; }
  tr.clickable td .company-link {
    color: #60a5fa; text-decoration: none; font-weight: 500;
    transition: color 0.15s;
  }
  tr.clickable:hover td .company-link { color: #93c5fd; text-decoration: underline; }

  /* Detail Page */
  #detailPage {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: #0f172a;
    overflow-y: auto;
    animation: slideIn 0.25s ease;
  }
  #detailPage.active { display: block; }
  @keyframes slideIn {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  .detail-header {
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    padding: 16px 24px;
    display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .detail-header-title { font-size: 16px; font-weight: 700; color: #fff; }
  .detail-header-sub { font-size: 12px; color: #93c5fd; margin-top: 2px; }

  .detail-body { padding: 24px; max-width: 800px; margin: 0 auto; }

  .detail-status-bar {
    border-radius: 10px; padding: 14px 20px;
    margin-bottom: 24px; display: flex; align-items: center; gap: 12px;
  }
  .detail-status-bar.expired { background: #450a0a; border: 1px solid #dc2626; }
  .detail-status-bar.soon3   { background: #451a03; border: 1px solid #d97706; }
  .detail-status-bar.soon6   { background: #1c1917; border: 1px solid #f97316; }
  .detail-status-bar.ok      { background: #052e16; border: 1px solid #22c55e; }
  .detail-status-bar.reserve { background: #1e293b; border: 1px solid #475569; }
  .detail-status-icon { font-size: 28px; }
  .detail-status-text { font-size: 15px; font-weight: 700; }
  .detail-status-bar.expired .detail-status-text { color: #fca5a5; }
  .detail-status-bar.soon3   .detail-status-text { color: #fcd34d; }
  .detail-status-bar.soon6   .detail-status-text { color: #fdba74; }
  .detail-status-bar.ok      .detail-status-text { color: #86efac; }
  .detail-status-bar.reserve .detail-status-text { color: #94a3b8; }
  .detail-status-sub { font-size: 12px; color: #94a3b8; margin-top: 3px; }

  .detail-section { background: #1e293b; border-radius: 12px; border: 1px solid #334155; padding: 20px; margin-bottom: 16px; }
  .detail-section-title { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #334155; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .detail-field .field-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .detail-field .field-value { font-size: 15px; color: #e2e8f0; font-weight: 500; }
  .field-value.highlight { color: #a78bfa; font-size: 20px; font-weight: 800; }
  .field-value.company-name { color: #60a5fa; font-size: 16px; line-height: 1.4; }

  /* Progress bar for contract period */
  .progress-wrap { margin-top: 16px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: #64748b; margin-bottom: 6px; }
  .progress-bar { height: 8px; background: #0f172a; border-radius: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 8px; transition: width 0.6s ease; }

  @media (max-width: 768px) {
    .main { padding: 14px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    table { font-size: 11px; }
    td, th { padding: 8px 10px; }
    .detail-body { padding: 14px; }
    .detail-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
