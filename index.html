<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard ตารางรายการรถเช่า</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* [ส่วน Style ทั้งหมดคงเดิมเหมือนโค้ดล่าสุด] */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  header {
    background: linear-gradient(135deg, #f5f5f0 0%, #ffffff 60%, #eef2ff 100%);
    padding: 14px 32px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    border-bottom: 3px solid #1e40af;
  }
  header .icon { font-size: 36px; }
  header h1 { font-size: 22px; font-weight: 700; color: #1e3a8a; letter-spacing: 0.5px; }
  header p { font-size: 13px; color: #3b82f6; margin-top: 2px; }
  .main { padding: 24px 28px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: #1e293b; border-radius: 12px; padding: 18px 20px; border: 1px solid #334155; position: relative; overflow: hidden; }
  .kpi-card .accent { position: absolute; top: 0; left: 0; width: 4px; height: 100%; border-radius: 12px 0 0 12px; }
  .kpi-card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; }
  .kpi-card .value { font-size: 28px; font-weight: 800; line-height: 1; }
  .kpi-card .sub { font-size: 12px; color: #64748b; margin-top: 6px; }
  .kpi-blue .accent { background: #3b82f6; } .kpi-blue .value { color: #60a5fa; }
  .kpi-green .accent { background: #22c55e; } .kpi-green .value { color: #4ade80; }
  .kpi-purple .accent { background: #a855f7; } .kpi-purple .value { color: #c084fc; }
  .kpi-red .accent { background: #ef4444; } .kpi-red .value { color: #f87171; }
  .kpi-yellow .accent { background: #f59e0b; } .kpi-yellow .value { color: #fbbf24; }
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; margin-bottom: 24px; }
  .chart-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
  .chart-card h3 { font-size: 14px; font-weight: 600; color: #cbd5e1; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .chart-card canvas { max-height: 240px; }
  .alert-section { margin-bottom: 24px; }
  .alert-box { background: #431407; border: 1px solid #dc2626; border-radius: 10px; padding: 14px 20px; display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .alert-box.warn { background: #451a03; border-color: #d97706; }
  .alert-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
  .alert-title { font-size: 14px; font-weight: 700; color: #fca5a5; }
  .alert-box.warn .alert-title { color: #fcd34d; }
  .alert-list { margin-top: 6px; font-size: 12px; color: #94a3b8; line-height: 1.6; }
  .table-section { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
  .table-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
  .filters { display: flex; gap: 10px; }
  .filters select, .filters input { background: #0f172a; color: #e2e8f0; border: 1px solid #475569; border-radius: 8px; padding: 7px 12px; font-size: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #0f172a; color: #64748b; padding: 10px 14px; text-align: left; text-transform: uppercase; font-size: 11px; }
  td { padding: 10px 14px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
  tr.clickable { cursor: pointer; }
  tr:hover td { background: #243044; }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-new { background: #1d4ed8; color: #bfdbfe; }
  .badge-used { background: #374151; color: #9ca3af; }
  .badge-expired { background: #450a0a; color: #fca5a5; border: 1px solid #dc2626; }
  .badge-soon3 { background: #451a03; color: #fcd34d; border: 1px solid #d97706; }
  .badge-soon6 { background: #1c1917; color: #fdba74; border: 1px solid #f97316; }
  .badge-ok { background: #052e16; color: #86efac; border: 1px solid #22c55e; }
  #detailPage { display: none; position: fixed; inset: 0; z-index: 100; background: #0f172a; overflow-y: auto; }
  #detailPage.active { display: block; }
  .detail-header { background: linear-gradient(135deg, #1e3a8a, #2563eb); padding: 16px 24px; display: flex; align-items: center; color: #fff; position: sticky; top: 0; }
  .detail-body { padding: 24px; max-width: 800px; margin: 0 auto; }
  .detail-section { background: #1e293b; border-radius: 12px; border: 1px solid #334155; padding: 20px; margin-bottom: 16px; }
  .detail-section-title { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 16px; border-bottom: 1px solid #334155; padding-bottom: 8px; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .field-label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
  .field-value { font-size: 15px; color: #e2e8f0; font-weight: 500; }
  .field-value.highlight { color: #a78bfa; font-size: 20px; font-weight: 800; }
</style>
</head>
<body>

<header>
  <img src="logo.jpg" alt="Logo" style="height: 52px;">
  <div style="flex: 1; text-align: center;">
    <h1 style="background: #000; color: #FFC82E; padding: 5px 15px; display: inline-block; border-radius: 4px;">Dashboard รายการรถเช่า</h1>
  </div>
  <img src="forklift.jpg" alt="Forklift" style="height: 80px;">
</header>

<div id="detailPage">
  <div class="detail-header">
    <div id="detail-header-title" style="font-weight:700;">รายละเอียด</div>
    <button onclick="closDetail()" style="margin-left:auto; background:none; color:white; border:1px solid white; padding:5px 15px; border-radius:5px; cursor:pointer;">✕ ปิด</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<div class="main">
  <div class="kpi-grid">
    <div class="kpi-card kpi-blue"><div class="accent"></div><div class="label">รถทั้งหมด</div><div class="value" id="kpi-total">–</div></div>
    <div class="kpi-card kpi-green"><div class="accent"></div><div class="label">รายได้รวม/เดือน</div><div class="value" id="kpi-revenue">–</div></div>
    <div class="kpi-card kpi-purple"><div class="accent"></div><div class="label">ราคาเฉลี่ย/เดือน</div><div class="value" id="kpi-avg">–</div></div>
    <div class="kpi-card kpi-red"><div class="accent"></div><div class="label">หมดสัญญาแล้ว</div><div class="value" id="kpi-expired">–</div></div>
    <div class="kpi-card kpi-yellow"><div class="accent"></div><div class="label">ใกล้หมด ≤ 3 เดือน</div><div class="value" id="kpi-soon3">–</div></div>
  </div>

  <div class="alert-section" id="alert-section"></div>

  <div class="charts-grid">
    <div class="chart-card"><h3>🗺️ จำนวนรถรายจังหวัด (คัน)</h3><canvas id="chartProvince"></canvas></div>
    <div class="chart-card"><h3>⏳ สถานะการหมดสัญญา</h3><canvas id="chartExpiry"></canvas></div>
    <div class="chart-card"><h3>🔧 รูปแบบรถ (Model)</h3><canvas id="chartModel"></canvas></div>
    <div class="chart-card"><h3>🆕 New vs Used</h3><canvas id="chartNewUsed"></canvas></div>
  </div>

  <div class="table-section">
    <div class="table-header">
      <h3>📋 รายการรถเช่าทั้งหมด</h3>
      <div class="filters">
        <input type="text" id="searchInput" placeholder="🔍 ค้นหาบริษัท..." oninput="applyFilters()">
        <select id="filterProvince" onchange="applyFilters()"><option value="">ทุกจังหวัด</option></select>
        <select id="filterExpiry" onchange="applyFilters()"><option value="">ทุกสถานะ</option></select>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr><th>#</th><th>บริษัท</th><th>จังหวัด</th><th>รุ่น</th><th>ประเภท</th><th>วันหมดสัญญา</th><th>คงเหลือ</th><th>สถานะ</th><th>ราคา</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// [SCRIPT CONFIG & LOADING คงเดิม]
const SHEET_ID = '1iFWpgZBXHa93M6iTlI5Xce4jTJVEy374tBDtHMKyCZI';
let G_DATA = [];
let myCharts = {};

async function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[\s\S]*?setResponse\(/, '').replace(/\);?\s*$/, ''));
  const rows = json.table.rows;
  const cols = json.table.cols.map(c => c.label);

  G_DATA = rows.map((r, idx) => {
    let obj = { _idx: idx };
    r.c.forEach((cell, i) => { if(cols[i]) obj[cols[i]] = cell ? cell.v : ''; });
    
    // คำนวณวันหมดสัญญา
    if (obj.end) {
      const target = new Date(obj.end);
      const today = new Date(); today.setHours(0,0,0,0);
      obj.days_left = Math.round((target - today) / 86400000);
    } else { obj.days_left = null; }

    if (obj.days_left === null) obj.expiry_cat = 'ไม่ระบุ';
    else if (obj.days_left < 0) obj.expiry_cat = 'หมดสัญญาแล้ว';
    else if (obj.days_left <= 90) obj.expiry_cat = 'ภายใน 3 เดือน';
    else if (obj.days_left <= 180) obj.expiry_cat = 'ภายใน 6 เดือน';
    else obj.expiry_cat = 'มากกว่า 6 เดือน';

    return obj;
  });
// ============================================================
// ส่วนที่แก้ไข: ฟังก์ชัน renderDashboard พร้อมการจัดเรียง Alert ให้ตรงกัน
// ============================================================
function renderDashboard() {
  const DATA = G_DATA.filter(d => d.contract_no !== 'รถสำรองใช้งาน');
  const withPrice = DATA.filter(d => d.price > 0);

  // 1. Update KPIs
  document.getElementById('kpi-total').textContent = G_DATA.length;
  document.getElementById('kpi-revenue').textContent = withPrice.reduce((s, d) => s + d.price, 0).toLocaleString();
  
  const expired = DATA.filter(d => d.expiry_cat === 'หมดสัญญาแล้ว');
  const soon3 = DATA.filter(d => d.expiry_cat === 'ภายใน 3 เดือน');

  document.getElementById('kpi-expired').textContent = expired.length;
  document.getElementById('kpi-soon3').textContent = soon3.length;

  // 2. Alerts Section
  let alertHtml = '';
  
  if (expired.length > 0) {
    alertHtml += `
      <div class="alert-box">
        <div class="alert-icon">🚨</div>
        <div style="flex:1">
          <div class="alert-title">หมดสัญญาแล้ว ${expired.length} คัน — ต้องดำเนินการด่วน</div>
          <div class="alert-list">
            ${expired.map(d => `
              <div style="display: flex; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 4px 0;">
                <span style="flex: 0 0 350px;">• ${d.company} (${d.province})</span>
                <span style="flex: 0 0 180px;">· วันหมด: ${d.end || '–'}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>`;
  }

  if (soon3.length > 0) {
    alertHtml += `
      <div class="alert-box warn">
        <div class="alert-icon">⚠️</div>
        <div style="flex:1">
          <div class="alert-title">ใกล้หมดสัญญาภายใน 3 เดือน จำนวน ${soon3.length} คัน</div>
          <div class="alert-list">
            ${soon3.map(d => `
              <div style="display: flex; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 4px 0;">
                <span style="flex: 0 0 350px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">• ${d.company} (${d.province})</span>
                <span style="flex: 0 0 180px;">· วันหมด: ${d.end || '–'}</span>
                <span style="flex: 1; font-weight: bold; color: #fbbf24;">· เหลือ ${d.days_left} วัน</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>`;
  }
  document.getElementById('alert-section').innerHTML = alertHtml;

  // 3. เรียกฟังก์ชันอื่นๆ ต่อ
  if (typeof updateCharts === 'function') updateCharts();
  G_filtered = [...G_DATA];
  G_page = 1;
  if (typeof renderTable === 'function') renderTable();
} // <--- ตรวจสอบปีกกาปิดตัวนี้ด้วยครับ

// ฟังก์ชันเปิดดูรายละเอียด (Detail Page) พร้อม Card หมายเหตุตามที่เคยแก้ไขไว้
function openDetail(idx) {
  const d = G_DATA.find(r => r._idx === idx);
  if (!d) return;

  const totalValue = (d.price || 0) * (d['งวด'] || 0);
  document.getElementById('detail-header-title').textContent = d.company;
  
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">🏢 ข้อมูลบริษัท</div>
      <div class="detail-grid">
        <div class="detail-field" style="grid-column:1/-1"><div class="field-label">ชื่อบริษัท</div><div class="field-value">${d.company}</div></div>
        <div class="detail-field"><div class="field-label">จังหวัด</div><div class="field-value">${d.province}</div></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">📅 ข้อมูลสัญญา</div>
      <div class="detail-grid">
        <div class="detail-field"><div class="field-label">วันสิ้นสุดสัญญา</div><div class="field-value">${d.end || '–'}</div></div>
        <div class="detail-field"><div class="field-label">จำนวนงวด</div><div class="field-value">${d['งวด'] || '–'} งวด</div></div>
      </div>
    </div>
    
    <div class="detail-section">
      <div class="detail-section-title">📝 หมายเหตุ</div>
      <div style="font-size: 15px; line-height: 1.6; white-space: pre-wrap;">${d.comment || 'ไม่มีหมายเหตุ'}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">💰 ข้อมูลการเงิน</div>
      <div class="detail-grid">
        <div class="detail-field"><div class="field-label">ค่าเช่า/เดือน</div><div class="field-value highlight">${(d.price||0).toLocaleString()} ฿</div></div>
        <div class="detail-field"><div class="field-label">มูลค่ารวม</div><div class="field-value highlight" style="color:#4ade80">${totalValue.toLocaleString()} ฿</div></div>
      </div>
    </div>
  `;
  document.getElementById('detailPage').classList.add('active');
}

function updateCharts(data) {
  const CC = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7'];
  
  // Chart 1: จังหวัด (จำนวนคัน)
  const pCount = {};
  data.forEach(d => { if(d.province) pCount[d.province] = (pCount[d.province] || 0) + 1; });
  const pLabels = Object.keys(pCount);
  const pVals = Object.values(pCount);

  if(myCharts.p) myCharts.p.destroy();
  myCharts.p = new Chart(document.getElementById('chartProvince'), {
    type: 'bar',
    data: { labels: pLabels, datasets: [{ data: pVals, backgroundColor: CC }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });

  // [Chart อื่นๆ คงเดิมตามฟังก์ชันเดิมของคุณ...]
}

function renderTable(data) {
  const html = data.map(d => `
    <tr class="clickable" onclick="openDetail(${d._idx})">
      <td>${d.no || ''}</td>
      <td>${d.company || ''}</td>
      <td>${d.province || ''}</td>
      <td>${d.model || ''}</td>
      <td><span class="badge ${d.new_used === 'NEW' ? 'badge-new' : 'badge-used'}">${d.new_used}</span></td>
      <td>${d.end || ''}</td>
      <td>${d.days_left !== null ? d.days_left + ' วัน' : '-'}</td>
      <td><span class="badge ${d.expiry_cat === 'หมดสัญญาแล้ว' ? 'badge-expired' : (d.expiry_cat === 'ภายใน 3 เดือน' ? 'badge-soon3' : 'badge-ok')}">${d.expiry_cat}</span></td>
      <td style="color:#a78bfa; font-weight:bold;">${(Number(d.price) || 0).toLocaleString()}</td>
    </tr>
  `).join('');
  document.getElementById('tableBody').innerHTML = html;
}

function openDetail(idx) {
  const d = G_DATA.find(item => item._idx === idx);
  const totalVal = (Number(d.price) || 0) * (Number(d['งวด']) || 0);
  
  document.getElementById('detail-header-title').innerText = d.company;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">🏢 ข้อมูลทั่วไป</div>
      <div class="detail-grid">
        <div><div class="field-label">บริษัท</div><div class="field-value">${d.company}</div></div>
        <div><div class="field-label">จังหวัด</div><div class="field-value">${d.province}</div></div>
        <div><div class="field-label">รุ่นรถ</div><div class="field-value">${d.model}</div></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">📅 ข้อมูลสัญญา</div>
      <div class="detail-grid">
        <div><div class="field-label">เริ่มสัญญา</div><div class="field-value">${d.start || '-'}</div></div>
        <div><div class="field-label">สิ้นสุดสัญญา</div><div class="field-value">${d.end || '-'}</div></div>
        <div><div class="field-label">จำนวนงวด</div><div class="field-value">${d['งวด'] || '-'}</div></div>
      </div>
    </div>
    
    <div class="detail-section">
      <div class="detail-section-title">📝 หมายเหตุ</div>
      <div style="font-size: 15px; color: #e2e8f0; line-height: 1.6; white-space: pre-wrap;">${d.comment || 'ไม่มีหมายเหตุ'}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">💰 ข้อมูลการเงิน</div>
      <div class="detail-grid">
        <div><div class="field-label">ค่าเช่า/เดือน</div><div class="field-value highlight">${(Number(d.price)||0).toLocaleString()} ฿</div></div>
        <div><div class="field-label">รวมมูลค่าสัญญา</div><div class="field-value highlight" style="color:#4ade80;">${totalVal.toLocaleString()} ฿</div></div>
      </div>
    </div>
  `;
  document.getElementById('detailPage').classList.add('active');
}

function closDetail() { document.getElementById('detailPage').classList.remove('active'); }

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const prov = document.getElementById('filterProvince').value;
  const filtered = G_DATA.filter(d => 
    (!search || d.company.toLowerCase().includes(search)) &&
    (!prov || d.province === prov)
  );
  renderTable(filtered);
}

window.onload = loadData;
</script>
</body>
</html>
