<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard ตารางรายการรถเช่า</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #f5f5f0 0%, #ffffff 60%, #eef2ff 100%);
    padding: 14px 32px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    border-bottom: 3px solid #1e40af;
  }
  header .icon { font-size: 36px; }
  header h1 { font-size: 22px; font-weight: 700; color: #1e3a8a; letter-spacing: 0.5px; }
  header p { font-size: 13px; color: #3b82f6; font-weight: 500; }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  /* KPI Section */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: #1e293b;
    padding: 20px;
    border-radius: 16px;
    border: 1px solid #334155;
    text-align: center;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
  }
  .kpi-card h3 { font-size: 13px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .kpi-card .value { font-size: 28px; font-weight: 800; color: #f8fafc; }
  .kpi-card .unit { font-size: 14px; color: #64748b; margin-left: 4px; }

  /* Chart Section */
  .chart-section {
    background: #1e293b;
    padding: 24px;
    border-radius: 20px;
    border: 1px solid #334155;
    margin-bottom: 24px;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
  }
  .chart-container { height: 300px; width: 100%; position: relative; }

  /* Filter Section */
  .controls {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    margin-bottom: 20px;
  }
  .search-wrapper { position: relative; }
  input, select {
    background: #1e293b;
    border: 1px solid #334155;
    color: white;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
    width: 100%;
  }
  input:focus, select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }

  /* Card Grid */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 30px;
  }
  .card {
    background: #1e293b;
    border-radius: 16px;
    padding: 16px;
    border: 1px solid #334155;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover { transform: translateY(-4px); border-color: #3b82f6; box-shadow: 0 12px 20px -5px rgba(0,0,0,0.3); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
  .badge-new { background: #065f46; color: #34d399; }
  .badge-used { background: #92400e; color: #fbbf24; }

  .model-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: #f8fafc; }
  .company-name { font-size: 14px; color: #94a3b8; margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .info-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .label { color: #64748b; }
  .val { color: #cbd5e1; font-weight: 500; }

  /* Progress Bar */
  .progress-container { height: 6px; background: #334155; border-radius: 3px; margin-top: 12px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); border-radius: 3px; }

  /* Detail Overlay */
  #detailPage {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #0f172a; z-index: 1000;
    transform: translateX(100%); transition: 0.3s ease-out;
    overflow-y: auto; padding: 20px;
  }
  #detailPage.active { transform: translateX(0); }
  .back-btn { background: #1e293b; border: 1px solid #334155; color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; }
  
  .detail-header { background: #1e293b; padding: 24px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 16px; }
  .detail-section { background: #1e293b; padding: 20px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 16px; }
  .detail-section-title { font-size: 14px; color: #64748b; margin-bottom: 16px; text-transform: uppercase; font-weight: bold; }
  .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .detail-field { margin-bottom: 12px; }
  .field-label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
  .field-value { font-size: 16px; color: white; font-weight: 500; }
  .highlight { color: #3b82f6; font-size: 20px; font-weight: 700; }
</style>
</head>
<body>

<header>
  <div class="icon">🚜</div>
  <div>
    <h1>Rental Fleet Dashboard</h1>
    <p>Bangkok Komatsu Forklift</p>
  </div>
</header>

<div class="container">
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi-card"><h3>จำนวนรถทั้งหมด</h3><div class="value" id="totalUnits">-</div></div>
    <div class="kpi-card"><h3>จังหวัดที่รถเยอะสุด</h3><div class="value" id="topProvince">-</div></div>
    <div class="kpi-card"><h3>รุ่นยอดนิยม</h3><div class="value" id="topModel">-</div></div>
    <div class="kpi-card"><h3>รถใหม่ / รถใช้แล้ว</h3><div class="value" id="ratioNewUsed">-</div></div>
  </div>

  <div class="chart-section">
    <h2 style="margin-bottom:16px; font-size:18px; color: #94a3b8;">📊 จำนวนรถแยกตามจังหวัด (ยูนิต)</h2>
    <div class="chart-container">
      <canvas id="provinceChart"></canvas>
    </div>
  </div>

  <div class="controls">
    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="ค้นหาชื่อบริษัท หรือ รุ่นรถ..." oninput="updateUI()">
    </div>
    <select id="provinceFilter" onchange="updateUI()"><option value="">ทุกจังหวัด</option></select>
    <select id="modelFilter" onchange="updateUI()"><option value="">ทุกรุ่น</option></select>
  </div>

  <div class="card-grid" id="cardContainer">
    <div style="text-align:center; grid-column: 1/-1; padding: 50px; color: #64748b;">กำลังโหลดข้อมูล...</div>
  </div>
</div>

<div id="detailPage">
  <button class="back-btn" onclick="closDetail()">← กลับไปหน้ารวม</button>
  <div id="detailContent"></div>
</div>

<script>
// CONFIG
const SHEET_ID = '1iFWpgZBXHa93M6iTlI5Xce4jTJVEy374tBDtHMKyCZI'; 
let RAW_DATA = [];
let myChart = null;

// LOAD DATA
async function loadFromSheet() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
  try {
    const response = await fetch(url);
    const text = await response.text();
    const json = JSON.parse(text.replace(/^[\s\S]*?setResponse\(/, '').replace(/\);?\s*$/, ''));
    
    const rows = json.table.rows;
    const cols = json.table.cols;
    
    RAW_DATA = rows.map(row => {
      let obj = {};
      row.c.forEach((cell, i) => {
        if (cols[i] && cols[i].label) {
          let val = cell ? cell.v : '';
          // แปลงราคาเป็นตัวเลข
          if (cols[i].label === 'price') val = parseFloat(String(val).replace(/[^0-9.]/g, '')) || 0;
          obj[cols[i].label] = val;
        }
      });
      
      // คำนวณวันคงเหลือเบื้องต้น (สมมติ)
      obj.days_left = Math.floor(Math.random() * 1000); 
      return obj;
    });

    initFilters();
    updateUI();
  } catch (e) {
    document.getElementById('cardContainer').innerHTML = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
  }
}

function initFilters() {
  const provinces = [...new Set(RAW_DATA.map(d => d.province))].filter(Boolean).sort();
  const models = [...new Set(RAW_DATA.map(d => d.model))].filter(Boolean).sort();
  
  const pSelect = document.getElementById('provinceFilter');
  provinces.forEach(p => pSelect.innerHTML += `<option value="${p}">${p}</option>`);
  
  const mSelect = document.getElementById('modelFilter');
  models.forEach(m => mSelect.innerHTML += `<option value="${m}">${m}</option>`);
}

function updateUI() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const pFilter = document.getElementById('provinceFilter').value;
  const mFilter = document.getElementById('modelFilter').value;

  const filtered = RAW_DATA.filter(d => {
    const matchSearch = (d.company?.toLowerCase().includes(searchTerm)) || (d.model?.toLowerCase().includes(searchTerm));
    const matchProvince = !pFilter || d.province === pFilter;
    const matchModel = !mFilter || d.model === mFilter;
    return matchSearch && matchProvince && matchModel;
  });

  renderCards(filtered);
  updateKPIs(filtered);
  updateChart(filtered);
}

function updateKPIs(data) {
  document.getElementById('totalUnits').innerText = data.length.toLocaleString();
  
  // จังหวัดยอดนิยม
  const pCount = {};
  data.forEach(d => pCount[d.province] = (pCount[d.province] || 0) + 1);
  const topP = Object.entries(pCount).sort((a,b) => b[1]-a[1])[0];
  document.getElementById('topProvince').innerText = topP ? topP[0] : '-';

  // รุ่นยอดนิยม
  const mCount = {};
  data.forEach(d => mCount[d.model] = (mCount[d.model] || 0) + 1);
  const topM = Object.entries(mCount).sort((a,b) => b[1]-a[1])[0];
  document.getElementById('topModel').innerText = topM ? topM[0] : '-';

  // อัตราส่วน New/Used
  const news = data.filter(d => d.new_used === 'NEW').length;
  const used = data.length - news;
  document.getElementById('ratioNewUsed').innerText = `${news}/${used}`;
}

// === ส่วนที่แก้ไข: เปลี่ยนเป็นจำนวนรถแยกตามจังหวัด ===
function updateChart(data) {
  const pData = {};
  data.forEach(d => {
    if(d.province) pData[d.province] = (pData[d.province] || 0) + 1;
  });

  const labels = Object.keys(pData);
  const counts = Object.values(pData);

  const ctx = document.getElementById('provinceChart').getContext('2d');
  if (myChart) myChart.destroy();

  myChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'จำนวนรถ (คัน)',
        data: counts,
        backgroundColor: 'rgba(59, 130, 246, 0.8)',
        borderColor: '#3b82f6',
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e293b',
          titleColor: '#94a3b8',
          bodyColor: '#fff',
          cornerRadius: 8,
          padding: 12
        }
      },
      scales: {
        y: { 
          beginAtZero: true, 
          grid: { color: 'rgba(51, 65, 85, 0.5)' },
          ticks: { color: '#94a3b8', stepSize: 1 } 
        },
        x: { 
          grid: { display: false },
          ticks: { color: '#94a3b8' } 
        }
      }
    }
  });
}

function renderCards(data) {
  const container = document.getElementById('cardContainer');
  if(data.length === 0) {
    container.innerHTML = '<div style="text-align:center; grid-column:1/-1; padding:40px; color:#64748b;">ไม่พบข้อมูลที่ค้นหา</div>';
    return;
  }
  
  container.innerHTML = data.map((d, index) => {
    const progress = Math.min(100, Math.max(0, (d.days_left / 1000) * 100));
    return `
      <div class="card" onclick="showDetail(${index})">
        <div class="card-header">
          <span class="badge ${d.new_used === 'NEW' ? 'badge-new' : 'badge-used'}">${d.new_used}</span>
          <span style="color:#64748b; font-size:12px; font-weight:bold;">${d.province}</span>
        </div>
        <div class="model-name">${d.model || 'Unknown Model'}</div>
        <div class="company-name">${d.company || 'ไม่ระบุชื่อบริษัท'}</div>
        <div class="info-row">
          <span class="label">ค่าเช่า:</span>
          <span class="val" style="color:#4ade80">${d.price > 0 ? d.price.toLocaleString() + ' ฿' : '-'}</span>
        </div>
        <div class="progress-container">
          <div class="progress-bar" style="width: ${progress}%"></div>
        </div>
      </div>
    `;
  }).join('');
}

// DETAIL PAGE LOGIC
function showDetail(index) {
  const d = RAW_DATA[index];
  const content = document.getElementById('detailContent');
  
  content.innerHTML = `
    <div class="detail-header">
      <div class="badge ${d.new_used === 'NEW' ? 'badge-new' : 'badge-used'}" style="display:inline-block; margin-bottom:12px;">${d.new_used}</div>
      <h1 style="font-size:32px; margin-bottom:8px;">${d.model}</h1>
      <p style="color:#94a3b8; font-size:18px;">${d.company}</p>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">📍 ข้อมูลทั่วไป</div>
      <div class="detail-grid">
        <div class="detail-field"><div class="field-label">จังหวัด</div><div class="field-value">${d.province}</div></div>
        <div class="detail-field"><div class="field-label">สถานะรถ</div><div class="field-value">${d.new_used === 'NEW' ? 'รถใหม่' : 'รถใช้งานแล้ว'}</div></div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">💰 ข้อมูลการเช่า</div>
      <div class="detail-grid">
        <div class="detail-field">
          <div class="field-label">ค่าเช่าต่อเดือน</div>
          <div class="field-value highlight">${d.price > 0 ? d.price.toLocaleString() + ' ฿' : '-'}</div>
        </div>
        <div class="detail-field">
          <div class="field-label">วันที่เริ่มสัญญา</div>
          <div class="field-value">${d.start || '-'}</div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('detailPage').classList.add('active');
  window.scrollTo(0, 0);
}

function closDetail() {
  document.getElementById('detailPage').classList.remove('active');
}

window.onload = loadFromSheet;
</script>
</body>
</html>
